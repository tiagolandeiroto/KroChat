<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="main-grid-container">
            <div id="servers">
                <input type="button" class="server-blocks">
            </div>
            <div id="channels">
                <section class="server-name-channel-section">
                    <h4 class="server-name-channel"> The Porks</h4>
                </section>
                <section class="channel-section">
                    <button class="channel"># General</button>
                    <button class="channel"># Porks</button>
                </section>
            </div>
            <main id="chat">
                <header id="header">
                    <section class="server-name">
                        <h2># General</h2>
                    </section>
                    <section class="search-chat">
                        <input type="text" class="input-search-bar" placeholder="Search The Porks"/>
                    </section>
                </header>
                <section id="messages">
                </section>
                <footer id="message-area">
                    <textarea class="message-input" placeholder="Message"></textarea>
                </footer>
            </main>
            <div id="friends">
                <section class="friend-section">
                    <button class="friend">Vera Escrota</button>
                </section>
            </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
